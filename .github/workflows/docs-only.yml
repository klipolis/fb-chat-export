name: Docs-only Validation

on:
  push:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.skills/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.skills/**'

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Docs-only changes detected; no full build required."
