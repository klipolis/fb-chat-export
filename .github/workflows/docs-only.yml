name: Docs-only Validation

on:
  push:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.skills/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.skills/**'

jobs:
  docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '26'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:docs
      - run: pnpm run link:docs
      - run: echo "Docs-only validation complete: markdown lint and link check passed."
